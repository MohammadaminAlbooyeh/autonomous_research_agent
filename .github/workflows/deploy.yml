name: Deploy to Production

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Get version from tag
      id: tag_name
      run: |
        echo "current_version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build and push images
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/autonomous-research-agent-backend:${{ steps.tag_name.outputs.current_version }}
          ${{ secrets.DOCKER_USERNAME }}/autonomous-research-agent-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile.frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/autonomous-research-agent-frontend:${{ steps.tag_name.outputs.current_version }}
          ${{ secrets.DOCKER_USERNAME }}/autonomous-research-agent-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy notification
      run: echo "✅ Successfully deployed version ${{ steps.tag_name.outputs.current_version }}"
