name: Code Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint black isort flake8

    - name: Check code formatting with black
      run: |
        black --check backend tests || true

    - name: Check import sorting with isort
      run: |
        isort --check-only backend tests || true

    - name: Lint with flake8
      run: |
        flake8 backend tests --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Deep lint with pylint
      run: |
        pylint backend --disable=missing-docstring,too-few-public-methods,line-too-long --fail-under=7.0 || true

    - name: Type checking with mypy
      run: |
        pip install mypy
        mypy backend --ignore-missing-imports || true

  frontend-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Lint frontend code
      run: |
        cd frontend
        npm run lint || true

    - name: Build frontend
      run: |
        cd frontend
        npm run build
