apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  dashboard.json: |
    {
      "dashboard": {
        "title": "Autonomous Research Agent Monitoring",
        "panels": [
          {
            "title": "API Requests (5m rate)",
            "targets": [
              {
                "expr": "rate(http_requests_total[5m])"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Request Latency P95",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Active Research Tasks",
            "targets": [
              {
                "expr": "active_tasks"
              }
            ],
            "type": "gauge"
          },
          {
            "title": "Task Completion Rate",
            "targets": [
              {
                "expr": "rate(research_tasks_total{status=\"completed\"}[1h])"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Error Rate (1m)",
            "targets": [
              {
                "expr": "rate(errors_total[1m])"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Webhook Delivery Success Rate",
            "targets": [
              {
                "expr": "rate(webhooks_delivered_total{status=\"success\"}[1h]) / rate(webhooks_delivered_total[1h])"
              }
            ],
            "type": "gauge"
          },
          {
            "title": "Average Task Duration",
            "targets": [
              {
                "expr": "avg(research_task_duration_seconds)"
              }
            ],
            "type": "stat"
          },
          {
            "title": "Sources Found (1h)",
            "targets": [
              {
                "expr": "increase(research_sources_found_total[1h])"
              }
            ],
            "type": "stat"
          }
        ],
        "refresh": "30s",
        "time": {
          "from": "now-6h",
          "to": "now"
        }
      }
    }
